# Default configuration for GRPO, PPO, and TRPO benchmarking

# Environment settings
env:
  name: "HalfCheetah-v4"  # Options: HalfCheetah-v4, Walker2d-v4, Ant-v4, etc.
  seed: 42

# Training settings
training:
  total_timesteps: 1000000
  n_envs: 1
  seed: 42

# Network architecture (same for all algorithms)
network:
  policy: "MlpPolicy"
  net_arch:
    pi: [64, 64]
    vf: [64, 64]
  activation_fn: "tanh"

# Algorithm-specific hyperparameters
algorithms:
  ppo:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    
  trpo:
    learning_rate: 1.0e-3
    n_steps: 2048
    batch_size: 64
    gamma: 0.99
    gae_lambda: 0.95
    cg_max_steps: 10
    cg_damping: 0.1
    line_search_shrinking_factor: 0.8
    line_search_max_iter: 10
    n_critic_updates: 10
    target_kl: 0.01
    
  grpo:
    learning_rate: 3.0e-4
    n_steps: 2048
    batch_size: 64
    n_epochs: 10
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.0
    vf_coef: 0.5
    max_grad_norm: 0.5
    group_size: 4  # GRPO-specific: group size for relative policy optimization

# Logging settings
logging:
  log_dir: "./logs"
  tensorboard_log: "./logs/tensorboard"
  save_freq: 10000
  eval_freq: 10000
  n_eval_episodes: 10
  verbose: 1

# Results directory
results_dir: "./results"

